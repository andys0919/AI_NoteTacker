services:
  recording-worker:
    environment:
      RECORDING_EXECUTOR: screenapp
      MEETING_BOT_BASE_URL: http://meeting-bot:3000
      MEETING_BOT_BEARER_TOKEN: internal-token
      MEETING_BOT_BOT_NAME: AI NoteTacker
      MEETING_BOT_TEAM_ID: meeting-bot-team
      MEETING_BOT_TIMEZONE: UTC
      MEETING_BOT_USER_ID: meeting-bot-user
    depends_on:
      meeting-bot:
        condition: service_healthy

  transcription-worker:
    environment:
      WHISPER_MODEL: large-v3
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: float16
      SUMMARY_ENABLED: "true"
      SUMMARY_MODEL: gpt-5.3-codex-spark
      SUMMARY_REASONING_EFFORT: medium
      CODEX_CLI_PATH: codex
      CODEX_HOME: /codex-home
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    volumes:
      - ${CODEX_HOME}:/codex-home

  meeting-bot:
    image: ghcr.io/screenappai/meeting-bot:latest
    environment:
      NODE_ENV: production
      AUTH_BASE_URL_V2: http://control-plane:3000/v2
      MEETING_INACTIVITY_MINUTES: "52560000"
      REDIS_CONSUMER_ENABLED: "false"
      STORAGE_PROVIDER: s3
      UPLOADER_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: meeting-artifacts
      S3_REGION: us-east-1
      S3_USE_MINIO_COMPATIBILITY: "true"
      NOTIFY_WEBHOOK_ENABLED: "true"
      NOTIFY_WEBHOOK_URL: http://control-plane:3000/integrations/meeting-bot/completions
      UPLOADER_FILE_EXTENSION: .webm
    depends_on:
      control-plane:
        condition: service_healthy
      minio-bucket-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-bucket-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        /usr/bin/mc mb --ignore-existing local/meeting-artifacts
