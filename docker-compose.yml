services:
  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_SUMMARY_API_KEY: ${AZURE_OPENAI_SUMMARY_API_KEY:-}
      AZURE_OPENAI_SUMMARY_ENDPOINT: ${AZURE_OPENAI_SUMMARY_ENDPOINT:-}
      DEFAULT_TRANSCRIPTION_PROVIDER: ${DEFAULT_TRANSCRIPTION_PROVIDER:-azure-openai-gpt-4o-mini-transcribe}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-cloud}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-token}
      MEETING_BOT_CONTAINER_NAME: ${MEETING_BOT_CONTAINER_NAME:-ai_notetacker-meeting-bot-1}
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  recording-worker:
    build:
      context: .
      dockerfile: workers/recording-worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-token}
      WORKER_ID: worker-alpha
    depends_on:
      control-plane:
        condition: service_healthy

  transcription-worker:
    build:
      context: .
      dockerfile: workers/transcription-worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_SUMMARY_API_KEY: ${AZURE_OPENAI_SUMMARY_API_KEY:-}
      AZURE_OPENAI_SUMMARY_ENDPOINT: ${AZURE_OPENAI_SUMMARY_ENDPOINT:-}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-cloud}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-token}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-gpt-5.4-mini}
      WORKER_ID: transcriber-alpha
      SUMMARY_ENABLED: "true"
      CODEX_HOME: /codex-home
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    volumes:
      - ${CODEX_HOME}:/codex-home
    depends_on:
      control-plane:
        condition: service_healthy

  summary-worker:
    build:
      context: .
      dockerfile: workers/transcription-worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    command: ["python", "-m", "transcription_worker.summary_main"]
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_SUMMARY_API_KEY: ${AZURE_OPENAI_SUMMARY_API_KEY:-}
      AZURE_OPENAI_SUMMARY_ENDPOINT: ${AZURE_OPENAI_SUMMARY_ENDPOINT:-}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-cloud}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-token}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-gpt-5.4-mini}
      WORKER_ID: summarizer-alpha
      SUMMARY_ENABLED: "true"
      CODEX_HOME: /codex-home
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    volumes:
      - ${CODEX_HOME}:/codex-home
    depends_on:
      control-plane:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ainotetacker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ainotetacker"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
