services:
  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  recording-worker:
    build:
      context: .
      dockerfile: workers/recording-worker/Dockerfile
    env_file:
      - .env.example
    environment:
      WORKER_ID: worker-alpha
    depends_on:
      control-plane:
        condition: service_healthy

  transcription-worker:
    build:
      context: .
      dockerfile: workers/transcription-worker/Dockerfile
    env_file:
      - .env.example
    environment:
      WORKER_ID: transcriber-alpha
    depends_on:
      control-plane:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ainotetacker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ainotetacker"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
