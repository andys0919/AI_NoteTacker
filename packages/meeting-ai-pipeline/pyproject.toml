[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "meeting-ai-pipeline"
version = "0.1.0"
description = "Reusable GPU Whisper transcription and Codex summary pipeline for meeting recordings."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "boto3",
  "faster-whisper==1.2.1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
